---
# Configure Proxmox host networking to support VLAN-tagged VM traffic.
#
# Inventory: shared Ansible inventory (pve_hosts group) generated by generate_ansible_inventory.
# Run with:  ./run --build
#
# Per-host behaviour is driven by the pve_bridges list (from providers.proxmox.config_params
# pve-node entries in pwy-home-lab-pkg.yaml, emitted as pve_hosts by generate_ansible_inventory).
# Each bridge entry declares its technology (vlan-aware, linux, ovs) and IP assignment.
# configure-bridges.yaml dispatches to the correct sub-task per bridge.

- name: Load framework config
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load config_base role
      ansible.builtin.include_role:
        name: "{{ lookup('env', '_ANSIBLE_ROLES_DIR') }}/config_base"
    - ansible.builtin.include_tasks: tasks/capture-config-fact.yaml

- name: Configure Proxmox host bridge networking
  hosts: pve_hosts
  gather_facts: false
  become: true
  tasks:
    # Configure all bridges declared in pve_bridges (dispatches per technology).
    # Replaces the old flat configure-linux-bridge / configure-vlan-aware-bridge /
    # configure-cloud-public-vlan / configure-ovs-bridge call pattern.
    - ansible.builtin.include_tasks: tasks/configure-bridges.yaml
