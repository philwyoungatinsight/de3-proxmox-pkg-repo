---
# Configure Proxmox VE hosts: local storage content types, API token, and
# host bridge networking.
#
# Covers everything in scripts/setup-proxmox-pve.sh (except first-time SSH
# key setup, which must be done manually before Ansible can connect).
#
# Inventory: shared Ansible inventory (pve_hosts group) generated by generate_ansible_inventory.
# Run with:  ./run --build

- name: Load framework config
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load config_base role
      ansible.builtin.include_role:
        name: "{{ lookup('env', '_ANSIBLE_ROLES_DIR') }}/config_base"
    - ansible.builtin.include_tasks: tasks/capture-config-fact.yaml

- name: Fetch MaaS region controller root SSH public key
  hosts: maas_region
  gather_facts: false
  become: true
  tasks:
    - name: Read MaaS server root public key (if it exists)
      ansible.builtin.slurp:
        src: /root/.ssh/id_ed25519.pub
      register: _maas_pubkey_raw
      ignore_errors: true

    - name: Set MaaS root pubkey fact for downstream plays
      ansible.builtin.set_fact:
        _maas_root_pubkey: "{{ _maas_pubkey_raw.content | b64decode | trim }}"
      when: _maas_pubkey_raw is not failed

- name: Configure Proxmox hosts
  hosts: pve_hosts
  gather_facts: false
  become: true
  ignore_unreachable: true  # Physical machines (e.g. ms01-01) may not be deployed yet
  vars:
    _maas_server_host: "{{ groups['maas_server'] | first | default('') }}"
  tasks:
    # Skip this host if Proxmox is not yet installed or its API is not running
    # (e.g. ms01-01 during the install-proxmox wave). configure-proxmox runs
    # concurrently with install-proxmox; configure-proxmox-post-install handles
    # newly installed nodes.
    # Use shell so command-not-found exits 127 (not a module exception).
    # pvesh may exist but fail if pvedaemon is not yet running.
    - name: Check if Proxmox API is responding (pvesh get /version)
      ansible.builtin.shell: "pvesh get /version --output-format json 2>/dev/null && echo 'ready'"
      register: _pvesh_check
      failed_when: false
      changed_when: false

    - name: Skip host if Proxmox API not available yet
      ansible.builtin.meta: end_host
      when: "'ready' not in (_pvesh_check.stdout | default(''))"

    - ansible.builtin.include_tasks: tasks/sync-maas-ssh-key.yaml
      when: _maas_server_host in hostvars

    - ansible.builtin.include_tasks: tasks/configure-local-storage.yaml

    - ansible.builtin.include_tasks: tasks/configure-api-token.yaml

    # Configure all bridges declared in pve_bridges (dispatches per technology).
    # Replaces the old flat configure-linux-bridge / configure-vlan-aware-bridge /
    # configure-cloud-public-vlan / configure-ovs-bridge call pattern.
    - ansible.builtin.include_tasks: tasks/configure-bridges.yaml
