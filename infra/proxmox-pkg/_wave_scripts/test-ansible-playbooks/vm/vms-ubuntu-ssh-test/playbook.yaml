---
# Wave test: verify all Ubuntu test VMs (role_test_vm_ubuntu) are accessible via SSH
# after vms.proxmox.from-web.ubuntu wave completes. VMs boot with cloud-init + qemu-guest-agent;
# allow up to 180 s for cloud-init to finish and the agent to report an IP.
- name: Verify Ubuntu test VMs accessible via SSH
  hosts: test_vm_ubuntu
  gather_facts: false
  tasks:
    - name: Wait for SSH connection (allow time for cloud-init to complete)
      ansible.builtin.wait_for_connection:
        timeout: 180

    - name: Gather system facts via SSH
      ansible.builtin.gather_facts:

    - name: Report SSH result
      ansible.builtin.debug:
        msg: >-
          PASS: {{ inventory_hostname }} SSH OK
          ({{ ansible_distribution }} {{ ansible_distribution_version }},
          {{ ansible_default_ipv4.address | default(ansible_host) }})
